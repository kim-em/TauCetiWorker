name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The package declares requires-python >=3.11; test the supported range, not just the floor.
        python: ["3.11", "3.12", "3.13", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python }}   # uv (and tests/run-all) pick this interpreter
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Run the test suite
        run: ./tests/run-all

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      # Pin ruff so a new release's rules/formatter can't turn CI red without a code change here.
      - name: ruff check
        run: uvx ruff@0.15.18 check .
      - name: ruff format --check
        run: uvx ruff@0.15.18 format --check .
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      # --severity=warning: skip the info/style notes on the deliberate `A && B || C` test idiom
      # (where B, an echo, always succeeds), while still failing on real warnings and errors.
      - name: ShellCheck
        run: shellcheck --severity=warning scripts/claim.sh scripts/git-safe-push scripts/gh-safe-pr-create tests/*.sh tests/run-all

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build the wheel
        run: uv build
      # uv build proves the artifact builds; this proves the nonstandard force-include mapping
      # (tauceti -> tauceti_worker/__main__.py, plus prompts/ and scripts/) works once installed.
      - name: Install smoke test
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/tauceti --help
          /tmp/smoke/bin/python - <<'PY'
          import pathlib
          import tauceti_worker.__main__ as m
          base = pathlib.Path(m.__file__).parent
          assert (base / "prompts").is_dir(), "prompts/ missing from the installed wheel"
          assert (base / "scripts").is_dir(), "scripts/ missing from the installed wheel"
          print("bundled prompts/ and scripts/ present")
          PY
